<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Organizador Diplomacy</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Header -->
<header>
  <h1>🎲 Organizador Diplomacy <span id="pending-badge">⏳ Sin jugar</span></h1>
  <button class="btn btn-secondary" onclick="loadChain()">⟳ Actualizar</button>
  <button class="btn btn-secondary" id="btn-sync"      onclick="runScript('notion_sync')">↻ Sync Notion</button>
  <button class="btn btn-primary"   id="btn-organizar" onclick="runOrganizar()">▶ <span id="organizar-label">Organizar</span></button>
  <button class="btn btn-ghost"     id="btn-deselect"  onclick="deselectCsv()" style="display:none" title="Volver al CSV más reciente">✕</button>
</header>

<!-- Main -->
<div class="main">
  <div class="chain-area">
    <div id="chain">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>Cargando...</p>
      </div>
    </div>
  </div>
  <aside class="panel" id="panel">
    <div class="panel-inner">
      <div class="panel-header">
        <h2 id="panel-title">—</h2>
        <button class="btn btn-ghost" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </aside>
</div>

<!-- Terminal modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modal-icon">⏳</span>
      <span id="modal-title-text">Ejecutando…</span>
    </div>
    <div class="modal-out" id="modal-out"></div>
    <div class="modal-foot">
      <button class="btn btn-secondary" id="btn-modal-close" onclick="closeModal()" disabled>Cerrar</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
