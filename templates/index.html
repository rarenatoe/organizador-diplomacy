<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Organizador Diplomacy</title>
  <style>
    /* ── Variables ── */
    :root {
      --bg:             #f0f2f5;
      --surface:        #ffffff;
      --surface2:       #f8f9fa;
      --border:         #e5e7eb;
      --text:           #111827;
      --muted:          #6b7280;
      --csv-bg:         #eff6ff;
      --csv-border:     #3b82f6;
      --report-bg:      #f0fdf4;
      --report-border:  #22c55e;
      --report-dark:    #15803d;
      --pending-bg:     #fffbeb;
      --pending-border: #f59e0b;
      --accent:         #3b82f6;
      --danger:         #ef4444;
      --success:        #22c55e;
      --panel-w:        460px;
      --hdr:            56px;
      --radius:         10px;
      --shadow:         0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:      0 4px 12px rgba(0,0,0,.10);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: var(--hdr);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 17px;
      font-weight: 700;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #pending-badge {
      font-size: 11px;
      font-weight: 600;
      background: #fef3c7;
      color: #92400e;
      border: 1px solid var(--pending-border);
      padding: 2px 8px;
      border-radius: 99px;
      display: none;
    }
    #pending-badge.visible { display: inline-block; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }
    .btn-secondary { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }
    .btn-ghost { background: transparent; color: var(--muted); border: none; font-size: 18px; padding: 4px 8px; border-radius: 6px; }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); }

    /* ── Main layout ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Chain area ── */
    .chain-area {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      padding: 40px 36px;
      display: flex;
      align-items: flex-start;
    }
    #chain {
      display: flex;
      align-items: center;
      gap: 0;
      min-height: 140px;
    }

    /* ── Nodes ── */
    .node {
      cursor: pointer;
      border-radius: var(--radius);
      padding: 14px 16px;
      width: 156px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .15s, border-color .15s;
      border: 2px solid transparent;
      user-select: none;
    }
    .node:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .node.active { box-shadow: 0 0 0 3px rgba(59,130,246,.25); }
    .node-csv    { background: var(--csv-bg);    border-color: var(--csv-border); }
    .node-report { background: var(--report-bg); border-color: var(--report-border); }
    .node-csv.latest-pending { background: var(--pending-bg); border-color: var(--pending-border); }
    .node.active.node-csv    { border-color: var(--csv-border); }
    .node.active.node-report { border-color: var(--report-border); }

    .node-icon  { font-size: 20px; margin-bottom: 5px; }
    .node-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 3px; }
    .node-name  { font-size: 12px; font-weight: 600; color: var(--text); word-break: break-all; line-height: 1.4; }
    .node-meta  { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .3px;
      margin-top: 5px;
    }
    .badge-pending { background: #fef3c7; color: #92400e; border: 1px solid var(--pending-border); }
    .badge-latest  { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }

    /* Arrow connectors */
    .arrow { color: #9ca3af; font-size: 18px; padding: 0 6px; flex-shrink: 0; user-select: none; }

    /* Empty state */
    .empty-state { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px; color: var(--muted); text-align: center; }
    .empty-state .icon { font-size: 40px; }
    .empty-state p { font-size: 13px; }

    /* ── Detail panel ── */
    .panel {
      width: 0;
      overflow: hidden;
      border-left: 1px solid var(--border);
      background: var(--surface);
      transition: width .25s ease;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .panel.open { width: var(--panel-w); }

    .panel-inner { width: var(--panel-w); height: 100%; display: flex; flex-direction: column; }

    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .panel-header h2 { font-size: 14px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; }

    /* ── Sections inside panel ── */
    .section { margin-bottom: 22px; }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 10px; }

    /* Mesa cards */
    .mesa-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 13px;
      margin-bottom: 10px;
    }
    .mesa-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .mesa-title { font-weight: 700; font-size: 13px; }
    .gm-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .gm-tag-ok  { color: var(--report-dark); background: var(--report-bg); border: 1px solid var(--report-border); }
    .gm-tag-bad { color: #92400e; background: #fffbeb; border: 1px solid var(--pending-border); }

    .player-list { list-style: none; }
    .player-list li { font-size: 12px; padding: 4px 0; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
    .player-list li:last-child { border-bottom: none; }
    .p-num  { color: var(--muted); font-size: 11px; min-width: 16px; }
    .p-name { flex: 1; font-weight: 500; }
    .tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
    .tag-nuevo   { background: #fef9c3; color: #713f12; }
    .tag-antiguo { background: #f0fdf4; color: #166534; }

    /* CSV table */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: var(--surface2); padding: 7px 9px; text-align: left; font-weight: 600; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 6px 9px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* Waiting list */
    .waiting-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 7px; margin-bottom: 6px; font-size: 12px; }
    .waiting-name { font-weight: 600; }
    .waiting-cupos { color: #92400e; font-size: 11px; }

    /* Metadata grid */
    .meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; font-size: 12px; }
    .meta-key { color: var(--muted); font-weight: 500; }
    .meta-val { font-weight: 600; }

    /* Copy button */
    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      width: 100%;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      transition: background .15s;
    }
    .copy-btn:hover { background: var(--border); }
    .copy-btn.ok { background: var(--success); color: #fff; border-color: var(--success); }

    /* Share text pre */
    .share-pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      font-family: "SF Mono", Menlo, monospace;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      color: var(--text);
    }

    /* ── Terminal modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-box {
      background: #1a1b2e;
      border-radius: 14px;
      padding: 22px;
      width: 560px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .modal-title { font-size: 14px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .modal-out {
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 12px;
      color: #a8e6cf;
      background: #0d0d1a;
      border-radius: 8px;
      padding: 12px;
      min-height: 100px;
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .modal-out.err { color: #ff8a80; }
    .modal-foot { display: flex; justify-content: flex-end; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .65s linear infinite; }

    /* ── CSV selection (organizar source) ── */
    .node-csv.csv-selected { box-shadow: 0 0 0 3px rgba(34,197,94,.40), var(--shadow-md); }
    .node-csv.csv-selected .node-label { color: var(--success); }
  </style>
</head>

<body>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header>
  <h1>🎲 Organizador Diplomacy <span id="pending-badge">⏳ Sin jugar</span></h1>
  <button class="btn btn-secondary" onclick="loadChain()">⟳ Actualizar</button>
  <button class="btn btn-secondary" id="btn-sync"     onclick="runScript('notion_sync')">↻ Sync Notion</button>
  <button class="btn btn-primary"   id="btn-organizar" onclick="runOrganizar()">▶ <span id="organizar-label">Organizar</span></button>
  <button class="btn btn-ghost"     id="btn-deselect"  onclick="deselectCsv()" style="display:none" title="Volver al CSV más reciente">✕</button>
</header>

<!-- ── Main ───────────────────────────────────────────────────── -->
<div class="main">

  <!-- Chain -->
  <div class="chain-area">
    <div id="chain">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>Cargando...</p>
      </div>
    </div>
  </div>

  <!-- Detail panel -->
  <aside class="panel" id="panel">
    <div class="panel-inner">
      <div class="panel-header">
        <h2 id="panel-title">—</h2>
        <button class="btn btn-ghost" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </aside>

</div>

<!-- ── Terminal modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modal-icon">⏳</span>
      <span id="modal-title-text">Ejecutando…</span>
    </div>
    <div class="modal-out" id="modal-out"></div>
    <div class="modal-foot">
      <button class="btn btn-secondary" id="btn-modal-close" onclick="closeModal()" disabled>Cerrar</button>
    </div>
  </div>
</div>
<!-- ── Script ──────────────────────────────────────────────────── -->
<script>
  // ── Copy store ────────────────────────────────────────────────
  const _store = new Map();
  let _seq = 0;
  function reg(text) { const k = ++_seq; _store.set(k, text); return k; }

  document.getElementById('panel-body').addEventListener('click', async e => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    const text = _store.get(+btn.dataset.ck) ?? '';
    await navigator.clipboard.writeText(text);
    btn.classList.add('ok');
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copiado';
    setTimeout(() => { btn.classList.remove('ok'); btn.innerHTML = orig; }, 1500);
  });

  // ── Chain ─────────────────────────────────────────────────────
  async function loadChain() {
    const data = await fetch('/api/chain').then(r => r.json());
    renderChain(data);
  }

  function renderChain(data) {
    document.getElementById('pending-badge').classList.toggle('visible', !!data.pending);
    const el    = document.getElementById('chain');
    const nodes = data.nodes || [];
    if (!nodes.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>No hay CSVs en <strong>data/</strong></p><p>Ejecuta <em>Sync Notion</em> para comenzar.</p></div>';
      return;
    }
    el.innerHTML = nodes.map((n, i) =>
      (i > 0 ? '<span class="arrow">→</span>' : '') + (n.type === 'csv' ? csvNode(n) : reportNode(n))
    ).join('');
    updateSelectionUI(); // restore green ring after re-render
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function csvNode(n) {
    const badge = n.pending ? '<span class="badge badge-pending">⏳ Sin jugar</span>'
                : n.is_latest ? '<span class="badge badge-latest">Actual</span>' : '';
    return `<div class="node node-csv ${n.pending?'latest-pending':''}" data-filename="${esc(n.filename)}" data-type="csv">
      <div class="node-icon">📋</div><div class="node-label">CSV</div>
      <div class="node-name">${esc(n.filename)}</div>
      <div class="node-meta">${n.player_count} jugadores</div>${badge}</div>`;
  }

  function reportNode(n) {
    const date = (n.generated||'').split(' ')[0];
    const time = (n.generated||'').split(' ')[1] ?? '';
    return `<div class="node node-report" data-filename="${esc(n.filename)}" data-type="report">
      <div class="node-icon">📊</div><div class="node-label">Reporte</div>
      <div class="node-name">${esc(date)}</div>
      <div class="node-meta">${esc(time)}<br>${esc(n.partidas)}<br>${esc(n.en_espera)}</div></div>`;
  }

  // ── Node click ────────────────────────────────────────────────
  document.getElementById('chain').addEventListener('click', e => {
    const node = e.target.closest('.node');
    if (!node) return;
    const fn   = node.dataset.filename;
    const type = node.dataset.type;
    setActive(fn);
    if (type === 'csv') {
      setSelectedCsv(fn);
      openCSV(fn);
    } else {
      openReport(fn);
    }
  });

  function setActive(fn) {
    document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
    const el = document.querySelector(`[data-filename="${CSS.escape(fn)}"]`);
    if (el) el.classList.add('active');
  }

  // ── CSV selection ─────────────────────────────────────────────
  let _selectedCsv = null;

  function setSelectedCsv(filename) {
    _selectedCsv = filename;
    updateSelectionUI();
  }

  function deselectCsv() {
    _selectedCsv = null;
    updateSelectionUI();
  }

  function updateSelectionUI() {
    document.querySelectorAll('.node-csv').forEach(n =>
      n.classList.toggle('csv-selected', n.dataset.filename === _selectedCsv)
    );
    const label    = document.getElementById('organizar-label');
    const deselBtn = document.getElementById('btn-deselect');
    if (_selectedCsv) {
      const num = _selectedCsv.replace('jugadores_', '').replace('.csv', '');
      label.textContent         = `Organizar · ${num}`;
      deselBtn.style.display    = '';
    } else {
      label.textContent         = 'Organizar';
      deselBtn.style.display    = 'none';
    }
  }

  function runOrganizar() {
    runScript('organizar', _selectedCsv); // null → uses latest on server
  }

  // ── Panel ─────────────────────────────────────────────────────
  function openPanel(title) {
    document.getElementById('panel-title').textContent = title;
    document.getElementById('panel-body').innerHTML = '<p style="color:var(--muted);font-size:12px;padding:4px 0">Cargando…</p>';
    document.getElementById('panel').classList.add('open');
  }
  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  }

  // ── CSV panel ─────────────────────────────────────────────────
  async function openCSV(filename) {
    openPanel(filename);
    const data = await fetch(`/api/csv/${encodeURIComponent(filename)}`).then(r => r.json());
    const rows = data.rows ?? [];
    const cols   = ['Nombre','Experiencia','Juegos_Este_Ano','Prioridad','Partidas_Deseadas','Partidas_GM'];
    const labels = {Nombre:'Nombre',Experiencia:'Exp.',Juegos_Este_Ano:'Juegos',Prioridad:'Prior.',Partidas_Deseadas:'Desea',Partidas_GM:'GM'};
    const csvTxt = [cols.join(','), ...rows.map(r => cols.map(c => r[c]??'').join(','))].join('\n');
    const ck = reg(csvTxt);
    const tbody = rows.map(r => '<tr>' + cols.map(c => {
      let v = esc(r[c]??'');
      if (c==='Experiencia') {
        const color = r[c]==='Nuevo' ? '#713f12' : '#166534';
        const bg    = r[c]==='Nuevo' ? '#fef9c3' : '#f0fdf4';
        v = `<span style="font-size:10px;font-weight:700;color:${color};background:${bg};padding:1px 6px;border-radius:4px">${esc(r[c])}</span>`;
      }
      if (c==='Prioridad') v = r[c]==='True' ? '✓' : '';
      return `<td>${v}</td>`;
    }).join('') + '</tr>').join('');
    document.getElementById('panel-body').innerHTML = `
      <div class="section"><div class="section-title">Jugadores (${rows.length})</div>
        <button class="copy-btn" data-ck="${ck}">📋 Copiar tabla CSV</button></div>
      <div class="section"><div class="table-wrap"><table>
        <thead><tr>${cols.map(c=>`<th>${labels[c]}</th>`).join('')}</tr></thead>
        <tbody>${tbody}</tbody>
      </table></div></div>`;
  }

  // ── Report panel ──────────────────────────────────────────────
  async function openReport(filename) {
    openPanel(filename);
    const data     = await fetch(`/api/report/${encodeURIComponent(filename)}`).then(r => r.json());
    const reg_data = data.registro ?? {};
    const mesas    = data.detalle?.mesas ?? [];
    const waiting  = data.detalle?.waiting_list ?? [];
    const copyText = data.copypaste ?? '';
    document.getElementById('panel-title').textContent = reg_data['Generado'] ?? filename;
    let html = '';
    html += '<div class="section"><div class="section-title">Resumen</div><div class="meta-grid">';
    for (const [k, v] of Object.entries(reg_data))
      html += `<span class="meta-key">${esc(k)}</span><span class="meta-val">${esc(v)}</span>`;
    html += '</div></div>';
    const ckShare = reg(copyText);
    html += `<div class="section">
      <button class="copy-btn" data-ck="${ckShare}">📋 Copiar lista para compartir</button>
      <div class="share-pre" style="margin-top:8px">${esc(copyText)}</div>
    </div>`;
    if (mesas.length) {
      html += `<div class="section"><div class="section-title">Partidas (${mesas.length})</div>`;
      for (const mesa of mesas) {
        const gmTag = mesa.gm
          ? `<span class="gm-tag gm-tag-ok">GM: ${esc(mesa.gm)}</span>`
          : '<span class="gm-tag gm-tag-bad">⚠️ Sin GM</span>';
        const playersTxt = mesa.jugadores.map(j => j.nombre).join('\n');
        const ckMesa = reg(playersTxt);
        const playerRows = mesa.jugadores.map((j, i) => {
          const tag = j.etiqueta === 'Nuevo'
            ? '<span class="tag tag-nuevo">Nuevo</span>'
            : `<span class="tag tag-antiguo">${esc(j.etiqueta)}</span>`;
          return `<li><span class="p-num">${i+1}.</span><span class="p-name">${esc(j.nombre)}</span>${tag}</li>`;
        }).join('');
        html += `<div class="mesa-card">
          <div class="mesa-header"><span class="mesa-title">Partida ${mesa.numero}</span>${gmTag}</div>
          <ul class="player-list">${playerRows}</ul>
          <button class="copy-btn" data-ck="${ckMesa}" style="margin-top:9px">📋 Copiar jugadores</button>
        </div>`;
      }
      html += '</div>';
    }
    if (waiting.length) {
      const waitTxt = waiting.map(w => w.nombre).join('\n');
      const ckWait  = reg(waitTxt);
      html += `<div class="section"><div class="section-title">Lista de espera</div>
        ${waiting.map(w => `<div class="waiting-item">
          <span class="waiting-name">${esc(w.nombre)}</span>
          <span class="waiting-cupos">${esc(w.cupos)}</span>
        </div>`).join('')}
        <button class="copy-btn" data-ck="${ckWait}">📋 Copiar lista de espera</button>
      </div>`;
    }
    document.getElementById('panel-body').innerHTML = html;
  }

  // ── Run scripts ───────────────────────────────────────────────
  const scriptLabels = { notion_sync: '↻ Sync Notion', organizar: '▶ Organizar' };

  async function runScript(script, csvName = null) {
    const modal    = document.getElementById('modal');
    const out      = document.getElementById('modal-out');
    const titleEl  = document.getElementById('modal-title-text');
    const iconEl   = document.getElementById('modal-icon');
    const closeBtn = document.getElementById('btn-modal-close');
    out.textContent = ''; out.className = 'modal-out';
    titleEl.textContent = `Ejecutando ${scriptLabels[script]}…`;
    iconEl.innerHTML = '<span class="spinner"></span>';
    closeBtn.disabled = true;
    modal.classList.add('open');
    document.getElementById('btn-sync').disabled      = true;
    document.getElementById('btn-organizar').disabled = true;
    const body = (script === 'organizar' && csvName) ? { csv: csvName } : undefined;
    try {
      const res  = await fetch(`/api/run/${script}`, {
        method:  'POST',
        headers: body ? { 'Content-Type': 'application/json' } : {},
        body:    body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      const ok   = data.returncode === 0;
      iconEl.textContent  = ok ? '✅' : '❌';
      titleEl.textContent = ok ? `${scriptLabels[script]} completado` : `Error en ${scriptLabels[script]}`;
      out.textContent     = (data.stdout??'') + (data.stderr ? '\n[stderr]\n'+data.stderr : '');
      if (!ok) out.classList.add('err');
      if (ok)  await loadChain();
    } catch (e) {
      iconEl.textContent  = '❌';
      titleEl.textContent = 'Error de conexión';
      out.textContent     = String(e);
      out.classList.add('err');
    } finally {
      closeBtn.disabled = false;
      document.getElementById('btn-sync').disabled      = false;
      document.getElementById('btn-organizar').disabled = false;
    }
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  loadChain();
</script>
</body>
